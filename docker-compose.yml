version: '3.8'

services:
  postgres:
    container_name: ZVideo-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-zvideo}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1488}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ZVideo-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: ZVideo-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Сервис для автоматического создания бакета при первом запуске
  minio-init:
    image: minio/mc:latest
    container_name: ZVideo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb local/${MINIO_BUCKET:-zvideo-videos} --ignore-existing;
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-zvideo-videos};
      echo 'Bucket ${MINIO_BUCKET:-zvideo-videos} created';
      exit 0;
      "
    networks:
      - ZVideo-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-zvideo-videos}

networks:
  ZVideo-network:
    driver: bridge

volumes:
  minio_data:
    name: ZVideo_minio_data
  postgres_data:
    name: ZVideo_postgres_data
  redis_data:
    name: ZVideo_redis_data