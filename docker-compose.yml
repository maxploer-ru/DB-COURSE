version: '3.8'

services:
  migrate:
    container_name: ZVideo-migrate
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    entrypoint: ["/app/migrate"]
    command: ["-direction=up"]
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - ZVideo-network
    restart: "no"

  api:
    container_name: ZVideo-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MINIO_EXTERNAL_ENDPOINT: localhost:9000
    env_file:
      - .env.docker
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - ZVideo-network
    restart: unless-stopped

  frontend:
    container_name: ZVideo-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:80"
    networks:
      - ZVideo-network
    restart: unless-stopped

  postgres:
    container_name: ZVideo-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-zvideo}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-1488}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    container_name: ZVideo-mongo
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-zvideo}
      MONGO_APP_DB: ${MONGO_DB:-zvideo}
      MONGO_APP_USER: ${MONGO_USER:-zvideo_app}
      MONGO_APP_PASSWORD: ${MONGO_PASSWORD:-zvideo_app_password}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ZVideo-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: ZVideo-minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_CORS_ALLOW_ORIGIN: "http://localhost:3000"
      MINIO_CORS_ALLOW_METHODS: "PUT,GET"
      MINIO_CORS_ALLOW_HEADERS: "*"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - ZVideo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ZVideo-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb local/${MINIO_BUCKET:-zvideo-videos} --ignore-existing;
      /usr/bin/mc anonymous set download local/${MINIO_BUCKET:-zvideo-videos};
      echo 'Bucket ${MINIO_BUCKET:-zvideo-videos} created';
      exit 0;
      "
    networks:
      - ZVideo-network
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-zvideo-videos}

networks:
  ZVideo-network:
    driver: bridge

volumes:
  minio_data:
    name: ZVideo_minio_data
  postgres_data:
    name: ZVideo_postgres_data
  mongo_data:
    name: ZVideo_mongo_data
  redis_data:
    name: ZVideo_redis_data