openapi: 3.0.3
info:
  title: ZVideo API
  version: "1.0.0"
  description: API specification generated from server routes and DTOs.
servers:
  - url: /api
security:
  - bearerAuth: []
paths:
  /register:
    post:
      summary: Register user
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "409": { $ref: "#/components/responses/ErrorResponse" }
  /login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400": { $ref: "#/components/responses/ErrorResponse" }
        "401": { $ref: "#/components/responses/ErrorResponse" }
  /refresh:
    post:
      summary: Refresh access token
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Tokens refreshed
          headers:
            Set-Cookie:
              schema:
                type: string
              description: refresh_token cookie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401": { $ref: "#/components/responses/ErrorResponse" }
  /logout:
    post:
      summary: Logout
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401": { $ref: "#/components/responses/ErrorResponse" }
  /me:
    get:
      summary: Get current user
      tags: [Auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401": { $ref: "#/components/responses/ErrorResponse" }
